<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Fly the Plane - Avoid the Clouds</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: system-ui, -apple-system, sans-serif;
    }
    h1 {
      color: #87CEEB;
      margin-bottom: 8px;
      font-size: 1.5rem;
    }
    .instructions {
      color: #aaa;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }
    canvas {
      display: block;
      background: #87CEEB;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    }
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      margin-top: 20px;
      padding: 16px;
    }
    .joystick-container {
      position: relative;
      width: 120px;
      height: 120px;
      background: rgba(255,255,255,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      user-select: none;
    }
    .joystick-knob {
      position: absolute;
      width: 50px;
      height: 50px;
      background: rgba(255,255,255,0.9);
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .joystick-container.active .joystick-knob {
      background: rgba(200,220,255,0.95);
    }
    .updown-keys {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: center;
    }
    .updown-keys button {
      width: 80px;
      height: 48px;
      font-size: 1.2rem;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      cursor: pointer;
      touch-action: manipulation;
      user-select: none;
      transition: background 0.1s;
    }
    .updown-keys button:active {
      background: rgba(255,255,255,0.4);
    }
    .updown-keys button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>Fly the Plane</h1>
  <p class="instructions">WASD or use controls below · ↑↓ = resize mountain · Avoid clouds!</p>
  <canvas id="game" width="800" height="480"></canvas>
  <div class="controls">
    <div class="joystick-container" id="joystick">
      <div class="joystick-knob" id="joystickKnob"></div>
    </div>
    <div class="updown-keys">
      <button id="btnUp">▲ UP</button>
      <button id="btnDown">▼ DOWN</button>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    // Virtual coords: 0-10 (x), 0-6 (y) - matches Python version
    const W = 10, H = 6;
    const scaleX = canvas.width / W;
    const scaleY = canvas.height / H;

    function toScreen(x, y) {
      return { x: x * scaleX, y: (H - y) * scaleY }; // flip y for screen coords
    }

    // Mountain
    let mountainScale = 1.0;
    const mountainBase = [
      [0, 0], [2.5, 0], [5, 4], [7.5, 0], [10, 0]
    ];

    // Clouds: { x, y, speed, puffs: [[dx, dy, r], ...] }
    const clouds = [
      { x: 2, y: 4.5, speed: 0.03, puffs: [[-0.3, 0, 0.35], [0, 0.15, 0.4], [0.35, 0, 0.3], [0.15, -0.1, 0.25]] },
      { x: 6, y: 5.2, speed: 0.025, puffs: [[-0.25, 0.05, 0.3], [0.1, 0.2, 0.35], [0.4, 0, 0.28]] },
      { x: 8, y: 3.8, speed: 0.02, puffs: [[-0.2, 0, 0.25], [0.15, 0.1, 0.3], [0.45, 0, 0.22]] }
    ];

    // Plane
    let planeX = 1.5, planeY = 3;
    const planeSpeed = 0.25;           // Keyboard: per keypress
    const touchControlSpeed = 0.035;   // Joystick/buttons: per frame (less sensitive)
    const planeRadius = 0.22;

    let gameOver = false;

    // On-screen controls state
    let joystickX = 0, joystickY = 0;
    let joystickActive = false;
    let btnUpPressed = false, btnDownPressed = false;

    function getMountainPoints() {
      return mountainBase.map(([x, y]) => [x, y * mountainScale]);
    }

    function checkCollision() {
      for (const cloud of clouds) {
        for (const [dx, dy, r] of cloud.puffs) {
          const cx = cloud.x + dx;
          const cy = cloud.y + dy;
          const dist = Math.hypot(planeX - cx, planeY - cy);
          if (dist < r + planeRadius) return true;
        }
      }
      return false;
    }

    function drawSky() {
      ctx.fillStyle = '#87CEEB';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawMountain() {
      const points = getMountainPoints();
      ctx.beginPath();
      const p0 = toScreen(points[0][0], points[0][1]);
      ctx.moveTo(p0.x, p0.y);
      for (let i = 1; i < points.length; i++) {
        const p = toScreen(points[i][0], points[i][1]);
        ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();
      ctx.fillStyle = '#8B4513';
      ctx.fill();
      ctx.strokeStyle = '#654321';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawClouds() {
      ctx.fillStyle = 'rgba(255, 255, 255, 0.95)';
      for (const cloud of clouds) {
        for (const [dx, dy, r] of cloud.puffs) {
          const cx = cloud.x + dx;
          const cy = cloud.y + dy;
          const s = toScreen(cx, cy);
          const rx = r * scaleX;
          const ry = r * scaleY;
          ctx.beginPath();
          ctx.ellipse(s.x, s.y, rx, ry, 0, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawPlane() {
      const size = 0.35;
      const points = [
        [planeX + size, planeY],
        [planeX - size * 0.6, planeY + size * 0.5],
        [planeX - size * 0.6, planeY - size * 0.5]
      ];
      ctx.beginPath();
      const p0 = toScreen(points[0][0], points[0][1]);
      ctx.moveTo(p0.x, p0.y);
      for (let i = 1; i < points.length; i++) {
        const p = toScreen(points[i][0], points[i][1]);
        ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();
      ctx.fillStyle = '#333333';
      ctx.fill();
      ctx.strokeStyle = '#111111';
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawGameOver() {
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 36px system-ui';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2 - 20);
      ctx.font = '20px system-ui';
      ctx.fillText('You hit a cloud!', canvas.width / 2, canvas.height / 2 + 20);
    }

    function update() {
      if (gameOver) return;

      // Apply joystick movement (uses lower sensitivity)
      if (joystickActive && (joystickX !== 0 || joystickY !== 0)) {
        planeX = Math.max(0.3, Math.min(9.7, planeX + joystickX * touchControlSpeed));
        planeY = Math.max(0.5, Math.min(5.5, planeY + joystickY * touchControlSpeed));
      }
      // Apply up/down button movement (uses lower sensitivity)
      if (btnUpPressed) planeY = Math.min(5.5, planeY + touchControlSpeed);
      if (btnDownPressed) planeY = Math.max(0.5, planeY - touchControlSpeed);

      // Move clouds
      for (const cloud of clouds) {
        cloud.x += cloud.speed;
        if (cloud.x > 12) cloud.x = -2;
      }

      if (checkCollision()) {
        gameOver = true;
        btnUpPressed = btnDownPressed = false;
        resetJoystick();
        document.getElementById('btnUp').disabled = true;
        document.getElementById('btnDown').disabled = true;
      }
    }

    function draw() {
      drawSky();
      drawMountain();
      drawClouds();
      drawPlane();
      if (gameOver) drawGameOver();
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    document.addEventListener('keydown', (e) => {
      if (gameOver) return;

      const key = e.key.toLowerCase();
      if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown'].includes(key)) {
        e.preventDefault();
      }

      switch (key) {
        case 'w':
          planeY = Math.min(5.5, planeY + planeSpeed);
          break;
        case 's':
          planeY = Math.max(0.5, planeY - planeSpeed);
          break;
        case 'a':
          planeX = Math.max(0.3, planeX - planeSpeed);
          break;
        case 'd':
          planeX = Math.min(9.7, planeX + planeSpeed);
          break;
        case 'arrowup':
          mountainScale = Math.min(3, mountainScale + 0.15);
          break;
        case 'arrowdown':
          mountainScale = Math.max(0.3, mountainScale - 0.15);
          break;
      }
    });

    // Joystick
    const joystick = document.getElementById('joystick');
    const joystickKnob = document.getElementById('joystickKnob');
    const joystickRadius = 60;
    const knobMaxOffset = 35;

    function getJoystickPos(e) {
      const rect = joystick.getBoundingClientRect();
      const clientX = e.touches ? e.touches[0].clientX : e.clientX;
      const clientY = e.touches ? e.touches[0].clientY : e.clientY;
      return {
        x: clientX - rect.left - rect.width / 2,
        y: clientY - rect.top - rect.height / 2
      };
    }

    function updateJoystick(pos) {
      const dist = Math.hypot(pos.x, pos.y);
      const clamped = dist > joystickRadius ? { x: pos.x * joystickRadius / dist, y: pos.y * joystickRadius / dist } : pos;
      joystickX = clamped.x / joystickRadius;
      joystickY = -clamped.y / joystickRadius; // flip y: up = positive
      joystickKnob.style.transform = `translate(calc(-50% + ${clamped.x}px), calc(-50% + ${-clamped.y}px))`;
    }

    function resetJoystick() {
      joystickActive = false;
      joystickX = joystickY = 0;
      joystickKnob.style.transform = 'translate(-50%, -50%)';
      joystick.classList.remove('active');
    }

    function onJoystickStart(e) {
      e.preventDefault();
      if (gameOver) return;
      joystickActive = true;
      joystick.classList.add('active');
      updateJoystick(getJoystickPos(e));
    }

    function onJoystickMove(e) {
      e.preventDefault();
      if (!joystickActive) return;
      updateJoystick(getJoystickPos(e));
    }

    function onJoystickEnd(e) {
      e.preventDefault();
      resetJoystick();
    }

    joystick.addEventListener('mousedown', onJoystickStart);
    document.addEventListener('mousemove', onJoystickMove);
    document.addEventListener('mouseup', onJoystickEnd);
    joystick.addEventListener('touchstart', onJoystickStart, { passive: false });
    document.addEventListener('touchmove', onJoystickMove, { passive: false });
    document.addEventListener('touchend', onJoystickEnd, { passive: false });

    // Up/Down buttons
    const btnUp = document.getElementById('btnUp');
    const btnDown = document.getElementById('btnDown');

    function setBtnState(btn, pressed) {
      if (btn === btnUp) btnUpPressed = pressed;
      else btnDownPressed = pressed;
      btn.disabled = gameOver;
    }

    btnUp.addEventListener('mousedown', (e) => { e.preventDefault(); setBtnState(btnUp, true); });
    btnUp.addEventListener('mouseup', () => setBtnState(btnUp, false));
    btnUp.addEventListener('mouseleave', () => setBtnState(btnUp, false));
    btnUp.addEventListener('touchstart', (e) => { e.preventDefault(); setBtnState(btnUp, true); });
    btnUp.addEventListener('touchend', () => setBtnState(btnUp, false));

    btnDown.addEventListener('mousedown', (e) => { e.preventDefault(); setBtnState(btnDown, true); });
    btnDown.addEventListener('mouseup', () => setBtnState(btnDown, false));
    btnDown.addEventListener('mouseleave', () => setBtnState(btnDown, false));
    btnDown.addEventListener('touchstart', (e) => { e.preventDefault(); setBtnState(btnDown, true); });
    btnDown.addEventListener('touchend', () => setBtnState(btnDown, false));

    gameLoop();
  </script>
</body>
</html>
